<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <style>
        #spec-container {
            position: relative;
            display: block;
            width: min(100vw,100vh);
            aspect-ratio: 1/1;
            padding: 0;
        }
        #spec-container > * {
            width: 33%;
            height: 33%;
            position: absolute;
            margin: 0;
        }
        #spec-center {
            transform: translate(100%,100%);
        }
        #spec-top {
            transform: translateX(100%);
        }
        #spec-left {
            transform: translateY(100%) rotateZ(270deg);
        }
        #spec-right {
            transform: translate(200%, 100%) rotateZ(90deg);
        }
        #spec-bottom {
            transform: translate(100%, 200%) rotateZ(180deg);
        }
        #pyramid-icon {
            width: 30px;
            height: 30px;
        }
    </style>
    <div class="bg-red-800 flex w-full h-[100vh] justify-center items-center">
        <div class="bg-black" id="spec-container">
            <div id="spec-center" class="flex justify-center items-center">
                <img src="pyramid.png" id="pyramid-icon"/>
            </div>
            <img src="anim.gif" id="spec-top"/>
            <img src="anim.gif" id="spec-left"/>
            <img src="anim.gif" id="spec-right"/>
            <img src="anim.gif" id="spec-bottom"/>
        </div>
    </div>
</body>
</html>
