<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom SOILS Generator</title>
  <style>
    :root {
      --bg: #111315;
      --panel: #171a1d;
      --panel-2: #1d2126;
      --panel-3: #20252b;
      --border: #2d333b;
      --text: #e6e6e6;
      --muted: #aab2bd;
      --green: #49a14d;
      --green-dark: #327536;
      --blue: #2f93ff;
      --danger: #b14f4f;
      --shadow: 0 10px 30px rgba(0,0,0,.25);
      --radius: 10px;
      --radius-sm: 7px;
      --field-h: 42px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      --sans: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      border-bottom: 1px solid #0b0d0f;
      background: linear-gradient(180deg, #1b1d21 0%, #14171a 100%);
      box-shadow: 0 4px 16px rgba(0,0,0,.2);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      font-size: 20px;
      color: #d7d7d7;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
    }

    .nav-icons {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #c5c9ce;
      font-size: 18px;
    }

    .nav-icon {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #1a1d21;
    }

    .content {
      display: grid;
      grid-template-columns: minmax(420px, 58%) minmax(360px, 42%);
      gap: 20px;
      padding: 18px;
      min-height: calc(100vh - 62px);
    }

    .left-panel {
      min-width: 0;
    }

    .right-panel {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .top-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      min-height: 46px;
    }

    .ghost-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #20242a;
      color: #d5d7da;
      font-weight: 600;
    }

    .version-wrap {
      position: relative;
    }

    .version-button {
      appearance: none;
      border: 1px solid var(--green-dark);
      background: var(--green);
      color: #eef9ee;
      font-weight: 700;
      border-radius: 10px;
      padding: 10px 38px 10px 14px;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
      min-width: 108px;
    }

    .version-wrap::after {
      content: '▾';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,.85);
      pointer-events: none;
      font-size: 12px;
    }

    .panel-title {
      font-size: 18px;
      font-weight: 700;
      margin: 8px 0 14px;
    }

    .section {
      margin-bottom: 22px;
    }

    .section-header {
      margin: 0 0 10px;
      padding: 0 0 8px;
      font-size: 14px;
      color: #d7dde4;
      font-weight: 700;
      letter-spacing: .02em;
      border-bottom: 1px solid #242a31;
      text-transform: uppercase;
    }

    .field-grid {
      display: grid;
      gap: 8px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 0;
      align-items: stretch;
      max-width: 740px;
    }

    .label-box,
    .input-box,
    .select-box,
    .textarea-box,
    .compound-box {
      min-height: var(--field-h);
      border: 1px solid var(--border);
      background: var(--panel-2);
    }

    .label-box {
      display: flex;
      align-items: center;
      padding: 0 14px;
      border-right: 0;
      border-radius: var(--radius-sm) 0 0 var(--radius-sm);
      color: #f0f3f6;
      font-size: 17px;
      white-space: nowrap;
    }

    .input-box,
    .select-box,
    .textarea-box,
    .compound-box {
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      overflow: hidden;
      background: #1a1e22;
    }

    input[type="text"],
    select,
    textarea {
      width: 100%;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      font: inherit;
      padding: 10px 14px;
    }

    select {
      cursor: pointer;
      height: 100%;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
      font-family: var(--mono);
      line-height: 1.45;
    }

    .required-star {
      color: #ff7f7f;
      margin-left: 4px;
      font-weight: 700;
    }

    .hint {
      margin-top: 4px;
      margin-left: 222px;
      color: var(--muted);
      font-size: 12px;
    }

    .list-box {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: #14181b;
      max-width: 740px;
      overflow: hidden;
    }

    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: #191d22;
    }

    .list-title {
      font-weight: 700;
    }

    .small-note {
      color: var(--muted);
      font-size: 12px;
    }

    .list-items {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
    }

    .list-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .list-item input {
      min-height: 38px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #1b2025;
    }

    button {
      border: 1px solid var(--border);
      background: #22282f;
      color: var(--text);
      border-radius: 8px;
      cursor: pointer;
      font: inherit;
    }

    .btn {
      min-height: 38px;
      padding: 0 12px;
    }

    .btn-add {
      background: #23472a;
      border-color: #2f6b39;
    }

    .btn-remove {
      background: #4b2626;
      border-color: #7d3a3a;
    }

    .output-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: linear-gradient(180deg, #191c20 0%, #15181b 100%);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 520px;
    }

    .output-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: #1d2126;
    }

    .output-toolbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .checkbox-row {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #d8dce0;
      font-size: 14px;
    }

    .checkbox-row input {
      width: 16px;
      height: 16px;
      accent-color: var(--green);
    }

    .copy-btn {
      padding: 8px 12px;
      font-weight: 600;
    }

    .output-area {
      flex: 10;
      margin: 0;
      padding: 16px;
      overflow: auto;
      font-family: var(--mono);
      line-height: 1.5;
      font-size: 15px;
      white-space: pre-wrap;
      word-break: break-word;
      color: #e2e7ec;
    }

    .output-area-command {
      flex: 1;
      margin: 0;
      padding: 16px;
      overflow: auto;
      font-family: var(--mono);
      line-height: 1;
      font-size: 15px;
      white-space: pre-wrap;
      word-break: break-word;
      color: #e2e7ec;
      background-color: #490e39;
    }

    .status-line {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      background: #171b1f;
    }

    .error-list {
      margin: 0;
      padding-left: 20px;
      color: #ff9d9d;
    }

    .muted-block {
      color: var(--muted);
    }

    @media (max-width: 1100px) {
      .content {
        grid-template-columns: 1fr;
      }
      .field-row {
        grid-template-columns: 180px 1fr;
      }
      .hint {
        margin-left: 182px;
      }
    }

    @media (max-width: 700px) {
      .navbar { padding: 0 12px; }
      .content { padding: 12px; }
      .field-row {
        grid-template-columns: 1fr;
      }
      .label-box {
        border-right: 1px solid var(--border);
        border-bottom: 0;
        border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      }
      .input-box,
      .select-box,
      .textarea-box,
      .compound-box {
        border-radius: 0 0 var(--radius-sm) var(--radius-sm);
      }
      .hint {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="navbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <img src="./BotanyPotThumbnail512.png" width="32px" height="32px">
        </div>
        <div>Botany Pots Custom SOILS Generator <a href="./customcrops.html" target="_blank" rel="noopener noreferrer">(Crops Generator)</a></div>
      </div>
      <div class="nav-icons" aria-hidden="true">
        <div class="nav-icon">◎</div>
        <div class="nav-icon">☾</div>
        <div class="nav-icon">⌘</div>
      </div>
    </div>

    <div class="content">
      <div class="left-panel">
        <div class="panel-title">Fields</div>

        <div class="section">
          <h3 class="section-header">General</h3>
          <div class="field-grid">
            <div>
              <div class="field-row">
                <div class="label-box">soil_id <span class="required-star">*</span></div>
                <div class="input-box"><input id="soil_id" type="text" placeholder="example: custom_dirt" /></div>
              </div>
              <div class="hint">Id / String with no spaces.</div>
            </div>

            <div>
              <div class="field-row">
                <div class="label-box">item_id <span class="required-star">*</span></div>
                <div class="input-box"><input id="item_id" type="text" placeholder="example: mymod:custom_dirt" /></div>
              </div>
              <div class="hint">Id / String with no spaces.</div>
            </div>
          </div>
        </div>

        <div class="section">
          <h3 class="section-header">Visuals data</h3>
          <div class="field-grid">
            <div class="hint">Id and size of the placed soil block</div>
            <div class="field-row">
              <div class="label-box">block_id <span class="required-star">*</span></div>
              <div class="input-box"><input id="block_id" type="text" placeholder="example: mymod:custom_dirt" /></div>
            </div>
          </div>
        </div>
      </div>

      <div class="right-panel">
        <div class="top-actions">
          <div class="ghost-pill"><a href="https://modrinth.com/project/fJ3GWBM4" style="color: white">Wiki</a></div>
          <div class="ghost-pill"><a href="https://paypal.me/coradonation" style="color: white">Donate</a></div>
          <div class="version-wrap">
            <select id="version" class="version-button" aria-label="Version selector">
              <option value="1.21.x">1.21.x</option>
              <option value="26.x">26.x</option>
            </select>
          </div>
        </div>

        <div class="output-card">
          <div class="output-toolbar">
            <div class="output-toolbar-left">
              <strong>Output</strong>
              <label class="checkbox-row">
                <input id="forceAppend" type="checkbox" />
                <span>Force append mode? (only if needed)</span>
              </label>
            </div>
            <button id="copyBtn" class="copy-btn" type="button">Copy Command</button>
          </div>
          <pre id="output-command" class="output-area-command"></pre>
          <pre id="output" class="output-area"></pre>
          <div id="statusLine" class="status-line">Ready.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'custom-generator-state-v1';

    const defaultState = {
      soil_id: 'my_soil_id',
      item_id: 'mymod:item_id',
      block_id: 'mymod:block_id',
    };

    let state = loadState();

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return structuredClone(defaultState);
        const parsed = JSON.parse(raw);
        const merged = { ...structuredClone(defaultState), ...parsed };
        if (!Array.isArray(merged.soils) || merged.soils.length === 0) merged.soils = [''];
        return merged;
      } catch {
        return structuredClone(defaultState);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function escapeNbtString(value) {
      return String(value).replace(/\\/g, '\\\\').replace(/"/g, '\\"');
    }

    function isNonEmptyNoSpaces(value) {
      return typeof value === 'string' && value.trim() !== '' && !/\s/.test(value);
    }

    function getValidationErrors() {
      const errors = [];
      const noSpaceRequired = [
        ['soil_id', state.soil_id],
        ['item_id', state.item_id],
        ['block_id', state.block_id]
      ];

      for (const [name, value] of noSpaceRequired) {
        if (!isNonEmptyNoSpaces(value)) {
          errors.push(`${name} is required and must not contain spaces.`);
        }
      }

      const optionalNoSpace = [
        ['half_ready_block_id', state.half_ready_block_id]
      ];

      for (const [name, value] of optionalNoSpace) {
        if (String(value).trim() !== '' && /\s/.test(value)) {
          errors.push(`${name} must not contain spaces.`);
        }
      }

      const soils = state.soils.map(v => String(v).trim()).filter(Boolean);
      if (soils.length === 0) {
        errors.push('At least one soil entry is required.');
      }

      if (String(state.loot).trim() === '') {
        errors.push('loot is required.');
      }

      return errors;
    }

    function calculateCommandContent() {
      const soilId = escapeNbtString(state.soil_id.trim());

      const soils = state.soils.map(v => String(v).trim()).filter(Boolean);
      var base = !Boolean(state.forceAppend) ? `/data modify storage ulg:botanypots custom_soils[{soil_id:"${soilId}"}] set value {`
      : "/data modify storage ulg:botanypots custom_soils append value {";
      base+=(`soil_id:"${soilId}", `);
      base+=(`item_id:"${escapeNbtString(state.item_id.trim())}", `);
      base+=(`block_id:"${escapeNbtString(state.block_id.trim())}"`);
      base+=('}');

      return base;
    }

    function calculateContent() {
      const soils = state.soils.map(v => String(v).trim()).filter(Boolean);
      const lines = [];

      lines.push('{');
      lines.push(`  soil_id: "${escapeNbtString(state.soil_id.trim())}",`);
      lines.push(`  item_id: "${escapeNbtString(state.item_id.trim())}",`);
      lines.push(`  block_id: "${escapeNbtString(state.block_id.trim())}"`);
      lines.push('}');

      return lines.join('\n');
    }

    function updateStateFromInputs() {
      state.soil_id = document.getElementById('soil_id').value;
      state.item_id = document.getElementById('item_id').value;
      state.block_id = document.getElementById('block_id').value;
      state.version = document.getElementById('version').value;
      state.forceAppend = document.getElementById('forceAppend').checked;
    }

    function rerender() {
      updateStateFromInputs();
      saveState();

      const errors = getValidationErrors();
      const output = document.getElementById('output');
      const outputCommand = document.getElementById('output-command');
      const statusLine = document.getElementById('statusLine');

      outputCommand.textContent = calculateCommandContent();
      output.textContent = calculateContent();

      if (errors.length) {
        statusLine.innerHTML = `<strong>${errors.length} issue${errors.length > 1 ? 's' : ''}:</strong><ul class="error-list">${errors.map(e => `<li>${e}</li>`).join('')}</ul>`;
      } else {
        statusLine.textContent = `Valid configuration for ${state.version}.`;
      }
    }

    function bindSimpleInputs() {
      const ids = [
        'soil_id', 'item_id', 'block_id', 'version', 'forceAppend'
      ];

      ids.forEach(id => {
        const el = document.getElementById(id);
        const eventName = el.tagName === 'SELECT' || el.type === 'checkbox' ? 'change' : 'input';
        el.addEventListener(eventName, rerender);
      });
    }

    function hydrateInputs() {
      document.getElementById('soil_id').value = state.soil_id;
      document.getElementById('item_id').value = state.item_id;
      document.getElementById('block_id').value = state.block_id;
      document.getElementById('version').value = state.version;
      document.getElementById('forceAppend').checked = state.forceAppend;
    }

    async function copyOutput() {
      const output = calculateCommandContent();
      const btn = document.getElementById('copyBtn');
      try {
        await navigator.clipboard.writeText(output);
        const old = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(() => btn.textContent = 'Remember to /reload', 600);
        setTimeout(() => btn.textContent = 'Copy Command', 1800);
      } catch {
        const old = btn.textContent;
        btn.textContent = 'Copy failed';
        setTimeout(() => btn.textContent = old, 1200);
      }
    }

    document.getElementById('copyBtn').addEventListener('click', copyOutput);

    hydrateInputs();
    bindSimpleInputs();
    rerender();
  </script>
</body>
</html>
